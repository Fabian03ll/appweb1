apply plugin: 'java'
apply plugin: 'jacoco'
apply plugin: 'war'

repositories {
    mavenCentral()
}

dependencies {
    providedCompile 'jakarta.platform:jakarta.jakartaee-web-api:8.0.0'
    
    testImplementation     'junit:junit:4.13'

    implementation 'com.microsoft.sqlserver:mssql-jdbc:12.6.1.jre11'
}
